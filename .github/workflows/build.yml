name: Publish binaries

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build controller
        run: GOOS=freebsd go build -o jails-controller ./cmd/controller/main.go

      - name: Build coredns discovery
        run: GOOS=freebsd go build -o coredns-discovery ./cmd/coredns_discovery/main.go

      - name: Build prometheus discovery
        run: GOOS=freebsd go build -o prometheus-discovery ./cmd/prometheus_discovery/main.go

      - name: Publish prerelease
        id: build-and-push
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          prerelease: true
          files: |
            jails-controller
            coredns-discovery
            prometheus-discovery
